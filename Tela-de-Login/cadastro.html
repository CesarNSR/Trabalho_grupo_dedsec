<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="main.css">
</head>

<body>

    <div class="background"></div>

    <header class="header">

        <h1 class="logo">TesteTelaCadastro</h1>

        
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        
        <nav>
            <a href="#">Contato</a>
            <a href="index.html">Login</a>

            <button id="theme-toggle" onclick="toggleTheme()">
                <span class="icon">🌙</span>
            </button>
        </nav>
    </header>

<form action="cadastro.php" method="POST" class="form-cadastro">

    <h2>Criar Conta</h2>

    <input type="text" name="nome" placeholder="Nome" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="password" name="senha" placeholder="Senha" required>

    <input type="password" name="confirmar_senha" placeholder="Confirmar senha" required>

    <button type="submit">Cadastrar</button>

</form>

    <main>
        <div class="login-container">
            <h2>Criar Conta</h2>

            <input type="text" placeholder="Usuário" id="username">
            <input type="password" placeholder="Senha" id="password">
            <input type="password" placeholder="Confirmar senha" id="confirmPassword">

            <button onclick="criarConta()">Cadastrar</button>

            <a href="index.html" class="forgot-password">Já tenho conta</a>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
